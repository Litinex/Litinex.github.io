      <h1>怎样写一篇未来自己也愿意重看的技术笔记</h1>
    </header>

    <article class="article-body">
      <p>
        技术笔记最常见的问题不是“不够专业”，而是缺少上下文。半年之后再看，往往只剩一堆结论，完全想不起自己当时为什么这么做。
      </p>
      <p>
        一篇值得保留的技术笔记，至少应该包含问题背景、你的判断过程、实际踩过的坑，以及最终的解决方案。
      </p>
      <p>
        如果能把失败路径也写进去，这篇笔记的价值会比只放正确答案高得多。
      </p>
    </article>
